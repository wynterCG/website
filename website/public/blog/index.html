<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dev Blog — Daniel Inverno</title>
  <meta name="description" content="Latest posts from the Daniel Inverno dev blog." />
  <link rel="alternate" type="application/feed+json" href="/blog/feed.json" />

  <!-- Brand fonts: Fraunces (display serif) + Inter (body). -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* Brand-aligned blog index — brass + Fraunces + Inter + #0b0f16 bg. */
    :root{
      --bg1:#0b0f16;--bg2:#0e1219;--bg3:#11151c;
      --text:#ffffff;--muted:#9aa3b2;--card:#10141b;--border:rgba(255,255,255,.08);
      --accent:#c9a76c;--accent2:#d8bd8a;
      --display:'Fraunces', ui-serif, Georgia, serif;
      --body:'Inter', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      --maxw:72rem
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;color:var(--text);
      background:linear-gradient(to bottom,var(--bg1),var(--bg2),var(--bg3));
      font:16px/1.6 var(--body);
      -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale
    }
    a{color:inherit;text-decoration:none}
    .container{max-width:var(--maxw);padding:0 1rem;margin:0 auto}
    header{position:sticky;top:0;z-index:50;backdrop-filter:saturate(120%) blur(6px);background:rgba(11,15,22,.7);border-bottom:1px solid var(--border)}
    .nav{height:64px;display:flex;align-items:center;justify-content:space-between}
    .nav > a{font-family:var(--display);font-weight:500;letter-spacing:-.01em;text-transform:lowercase;font-size:1.15rem}
    .links{display:none;gap:1.25rem;font-size:.9rem;color:#cbd5e1}
    @media (min-width:768px){.links{display:flex}}

    main{padding:3rem 0 4rem}
    .eyebrow{display:block;text-align:center;color:var(--accent);font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;font-size:.72rem;letter-spacing:.28em;text-transform:uppercase;font-weight:500;margin-bottom:.75rem}
    h1{font-family:var(--display);font-weight:600;font-size:clamp(2rem,4vw,3rem);line-height:1.05;letter-spacing:-.01em;text-align:center;margin:0;font-optical-sizing:auto}
    .subtle{color:var(--muted);text-align:center;margin-top:.75rem}

    .grid{display:grid;gap:1rem;margin-top:2rem;grid-template-columns:1fr}
    @media (min-width:768px){.grid{grid-template-columns:repeat(2,1fr)}}
    @media (min-width:1024px){.grid{grid-template-columns:repeat(3,1fr);gap:1.25rem}}

    .card{overflow:hidden;border-radius:22px;background:var(--card);border:1px solid var(--border);box-shadow:0 10px 40px -15px rgba(0,0,0,.7);display:flex;flex-direction:column;min-height:100%;transition:transform .2s ease,border-color .2s ease}
    .card:hover{transform:translateY(-2px);border-color:rgba(201,167,108,.4)}
    .thumb{width:100%;height:12rem;object-fit:cover;display:block}
    .thumb.fallback{background:linear-gradient(135deg,#13171f,#0b0f16)}
    .card-body{padding:1.25rem;display:flex;flex-direction:column;gap:.5rem;flex:1}
    .date{color:var(--muted);font-size:.75rem;font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;letter-spacing:.18em;text-transform:uppercase}
    .title{font-family:var(--display);font-weight:600;font-size:1.3rem;line-height:1.2;letter-spacing:-.005em;font-optical-sizing:auto}
    .summary{color:#cbd5e1;font-size:.95rem;margin-top:.25rem}
    .tags{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.25rem}
    .tag{border:1px solid var(--border);border-radius:999px;padding:.15rem .5rem;font-size:.7rem;color:var(--accent2);background:rgba(255,255,255,.04);letter-spacing:.04em}
    .actions{margin-top:.5rem}
    .btn{display:inline-block;padding:.5rem 1rem;border-radius:999px;background:var(--accent);color:#000;font-weight:500;font-size:.9rem;transition:background .2s}
    .btn:hover{background:var(--accent2)}
    .btn.ghost{background:transparent;color:var(--accent);border:1px solid var(--accent)}
    .btn.ghost:hover{background:var(--accent);color:#000}
    .center{text-align:center;margin-top:2rem}
    footer{border-top:1px solid var(--border);padding:2rem 0;color:#9ca3af}
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

    /* infinite scroll helpers */
    #sentinel{height:1px}
    #status{min-height:2rem;color:#cbd5e1}
    .loading-dots:after{content:"…";animation:ellipses 1.4s infinite}
    @keyframes ellipses{0%{content:""}33%{content:"."}66%{content:".."}100%{content:"..."}}
  </style>
</head>
<body>
  <header>
    <div class="container nav">
      <a href="/" aria-label="Go home">Daniel Inverno</a>
      <nav class="links" aria-label="Primary">
        <a href="/#work">Work</a>
        <a href="/#blog">Home Blog</a>
        <a href="/#about">About</a>
        <a href="/#contact">Contact</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <span class="eyebrow">Dev log — process notes</span>
    <h1>Notes from the studio</h1>
    <p class="subtle">Process, experiments, and dev logs from the projects I&rsquo;m building.</p>

    <div id="grid" class="grid" aria-live="polite"></div>

    <!-- status + sentinel for infinite scroll -->
    <div id="status" class="center" role="status" aria-live="polite"></div>
    <div id="sentinel" aria-hidden="true"></div>

    <div class="center" style="display:flex; gap:.75rem; justify-content:center">
      <button id="loadMore" class="btn" style="display:none">Load more</button>
      <a class="btn ghost" href="/">← Back to home</a>
    </div>
  </main>

  <footer>
    <div class="container">
      © <span id="year"></span> Daniel Inverno. All rights reserved.
    </div>
  </footer>

  <script>
    (function () {
      const YEAR = document.getElementById("year");
      YEAR.textContent = new Date().getFullYear();

      const gridEl    = document.getElementById("grid");
      const statusEl  = document.getElementById("status");
      const sentinel  = document.getElementById("sentinel");
      const loadMore  = document.getElementById("loadMore");

      const PAGE_SIZE = 9; // how many cards per batch
      let allItems = [];
      let nextIndex = 0;
      let isLoading = false;
      let isDone = false;
      let io = null;

      const fmtDate = (iso) => {
        if (!iso) return "";
        const d = new Date(iso);
        return isNaN(d) ? "" : d.toLocaleDateString(undefined, { year:"numeric", month:"short", day:"2-digit" });
      };

      const createCard = (item) => {
        const a = document.createElement("a");
        a.className = "card";
        a.href = item.url || item.external_url || "#";
        a.target = "_blank";
        a.rel = "noopener noreferrer";

        if (item.image || item.banner_image) {
          const img = document.createElement("img");
          img.className = "thumb";
          img.alt = "";
          img.loading = "lazy";
          img.src = item.image || item.banner_image;
          a.appendChild(img);
        } else {
          const ph = document.createElement("div");
          ph.className = "thumb fallback";
          a.appendChild(ph);
        }

        const body = document.createElement("div");
        body.className = "card-body";

        const date = document.createElement("div");
        date.className = "date";
        date.textContent = fmtDate(item.date_published || item.date_modified || "");
        body.appendChild(date);

        const title = document.createElement("div");
        title.className = "title";
        title.textContent = item.title || "Untitled";
        body.appendChild(title);

        const summaryText =
          item.summary || item.content_text || (item.content_html ? item.content_html.replace(/<[^>]+>/g, " ") : "");
        if (summaryText) {
          const summary = document.createElement("div");
          summary.className = "summary";
          summary.textContent = summaryText.trim().slice(0, 300);
          body.appendChild(summary);
        }

        if (Array.isArray(item.tags) && item.tags.length) {
          const tags = document.createElement("div");
          tags.className = "tags";
          item.tags.slice(0, 6).forEach((t) => {
            const chip = document.createElement("span");
            chip.className = "tag";
            chip.textContent = t;
            tags.appendChild(chip);
          });
          body.appendChild(tags);
        }

        const actions = document.createElement("div");
        actions.className = "actions";
        const btn = document.createElement("span");
        btn.className = "btn";
        btn.textContent = "Read article";
        actions.appendChild(btn);
        body.appendChild(actions);

        a.appendChild(body);
        return a;
      };

      function appendNextBatch() {
        if (isLoading || isDone) return;
        isLoading = true;
        statusEl.textContent = "Loading";
        statusEl.classList.add("loading-dots");

        const slice = allItems.slice(nextIndex, nextIndex + PAGE_SIZE);
        slice.forEach((it) => gridEl.appendChild(createCard(it)));
        nextIndex += slice.length;

        isLoading = false;
        statusEl.classList.remove("loading-dots");

        if (nextIndex >= allItems.length) {
          isDone = true;
          statusEl.textContent = "You’ve reached the end.";
          if (io) io.disconnect();
        } else {
          statusEl.textContent = "";
        }
      }

      async function loadFeed() {
        try {
          statusEl.textContent = "Loading";
          statusEl.classList.add("loading-dots");

          const res = await fetch("/blog/feed.json?t=" + Date.now(), {
            headers: { "Accept": "application/feed+json, application/json" },
            cache: "no-store"
          });
          if (!res.ok) throw new Error("HTTP " + res.status);
          const feed = await res.json();

          allItems = (feed.items || []).slice().sort((a, b) =>
            new Date(b.date_published || b.date_modified || 0) - new Date(a.date_published || a.date_modified || 0)
          );

          gridEl.innerHTML = "";
          nextIndex = 0;
          isDone = false;

          appendNextBatch(); // first page

          // IntersectionObserver for infinite scroll
          if ("IntersectionObserver" in window) {
            io = new IntersectionObserver(
              (entries) => {
                if (entries.some((e) => e.isIntersecting)) appendNextBatch();
              },
              { root: null, rootMargin: "1200px 0px 1200px 0px", threshold: 0 }
            );
            io.observe(sentinel);
          } else {
            // Fallback: show a manual Load more button
            loadMore.style.display = "inline-block";
            loadMore.addEventListener("click", appendNextBatch);
          }

          statusEl.classList.remove("loading-dots");
          if (!allItems.length) statusEl.textContent = "No posts yet.";
        } catch (err) {
          console.error(err);
          statusEl.classList.remove("loading-dots");
          statusEl.innerHTML = 'Couldn’t load the feed. Ensure <code>/blog/feed.json</code> exists and is valid.';
        }
      }

      loadFeed();
    })();
  </script>
</body>
</html>
